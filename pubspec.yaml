name: dataf1
description: Formula 1 telemetry interpretation and insight system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0

  # Charting
  fl_chart: ^0.66.0

  # Routing
  go_router: ^13.2.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Shimmer loading
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.2
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env

  # Barlow font is loaded via google_fonts package
  # No local font assets needed
